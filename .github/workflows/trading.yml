name: Intraday Trading Bot

# -----------------------------------------------------------------------
# Cron fires at 03:15 UTC = 08:45 IST (35 min before trade start).
# GitHub Actions can delay scheduled runs by up to 30–60 min during
# peak hours. By scheduling early, the runner is guaranteed to be active
# well before 09:20 IST when the Python script begins trading.
#
# The Python script (main.py) handles the wait internally:
#   → sits in a 30-second poll loop until 09:20 IST
#   → then selects candidates and starts the strategy loop
#
# Timeout: 390 minutes covers 08:45 → 15:15 IST with buffer.
# -----------------------------------------------------------------------
on:
  schedule:
    - cron: "15 3 * * 1-5"   # Mon–Fri, 08:45 IST (early to beat runner delays)
  workflow_dispatch:           # Manual run button in GitHub Actions UI

jobs:
  trade:
    name: Run Trading Bot
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    timeout-minutes: 390

    steps:
      # ---- 1. Checkout code ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 2. Set up Python ----
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ---- 3. Install dependencies ----
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ---- 4. Run the bot ----
      #   STOCKSDEVELOPER_API_KEY and STOCKSDEVELOPER_ACCOUNT are stored
      #   as GitHub Actions Secrets (repo Settings → Secrets and variables → Actions).
      #   They are never printed in logs.
      - name: Run trading bot
        env:
          STOCKSDEVELOPER_API_KEY: ${{ secrets.STOCKSDEVELOPER_API_KEY }}
          STOCKSDEVELOPER_ACCOUNT: ${{ secrets.STOCKSDEVELOPER_ACCOUNT }}
        run: python main.py

      # ---- 5. Commit performance_log.csv back to repo ----
      # Runs even if the bot exits early (if: always()) so no data is lost.
      # Uses the built-in GITHUB_TOKEN — no extra secret needed.
      - name: Save performance log to repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add performance_log.csv 2>/dev/null || true
          git diff --staged --quiet && echo "No new trades to commit." || \
            git commit -m "📊 Performance log $(date -u '+%Y-%m-%d')" && git push
